services:
  genome-analysis:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: genome-analysis
    restart: unless-stopped
    environment:
      - XDG_CACHE_HOME=/workspace/.cache
    volumes:
      - /home/nick/Documents/Projects-School/Atallah-Lab/genome-analysis-workspace:/workspace
    working_dir: /workspace
    stdin_open: true
    tty: true
